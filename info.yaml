# Tiny Tapeout project information
project:
  title:        "CFAR Radar Detector"
  author:       "Illamparuthi"
  discord:      ""
  description:  "CA-CFAR radar detector for target detection using dynamic noise threshold"
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x1"

  # Top module name
  top_module: "tt_um_ttsky_cfar"

  # Source files
  source_files:
    - "project.v"
    - "cfar.v"

# Pinout description
pinout:
  # Inputs
  ui[0]: "Radar sample bit0"
  ui[1]: "Radar sample bit1"
  ui[2]: "Radar sample bit2"
  ui[3]: "Radar sample bit3"
  ui[4]: "Radar sample bit4"
  ui[5]: "Radar sample bit5"
  ui[6]: "Radar sample bit6"
  ui[7]: "Radar sample bit7"

  # Outputs
  uo[0]: "CFAR detection output"
  uo[1]: "unused"
  uo[2]: "unused"
  uo[3]: "unused"
  uo[4]: "unused"
  uo[5]: "unused"
  uo[6]: "unused"
  uo[7]: "unused"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Required version
yaml_version: 6
